<section id="main-sec">

    <div class = 'reserva'>
    <form> 
    <label for="login">CPF</label>
    <input type="text" id="login">
    <br><br>
    <label for="date">Escolha uma data</label>
    <input type="date" id="date">
    <br><br>
    <label for="time">Escolha um horário</label>
    <br><br>
    
    <div class="horario">
      <div class="hora-div">
        <input type="radio" name="horario" value="13:30">
        <label class="hora" for="hora-1330">13:30</label>
      </div>
      <br><br>
      <div class="hora-div">
        <input type="radio" name="horario" value="14:00">
        <label class="hora" for="hora-1400">14:00</label>
      </div>
      <br><br>
      <div class="hora-div">
        <input type="radio" name="horario" value="14:30">
        <label class="hora" for="hora-1430">14:30</label>
      </div>
      <br><br>
      <div class="hora-div">
        <input type="radio" name="horario" value="15:00">
        <label class="hora" for="hora-1330">15:00</label>
      </div>
      <br><br>
      <div class="hora-div">
        <input type="radio"  name="horario" value="15:30">
        <label class="hora" for="hora-1400">15:30</label>
      </div>
      <br><br>
      <div class="hora-div">
        <input type="radio"  name="horario" value="16:00">
        <label class="hora" for="hora-1430">16:00</label>
      </div>
    </div>

    <br><br>
    
      <label for="time">Escolha a quantidade de vezes na semana</label>
      <br><br>
      <div id="dias-semana">

        <div class="dias">
          <input type="radio" id="1x/semana" name="semana" value="1">
          <label for="#">1 vez na semana</label>
        </div>

        <div class="dias">
          <input type="radio" id="2x/semana" name="semana" value="2">
          <label for="#">2 vezes na semana</label>
        </div>

        <div class="dias">
          <input type="radio" id="3x/semana" name="semana" value="3">
          <label for="#">3 vezes na semana</label>
        </div>
        <br><br>
        <div id="btns-dias">
          <button type="submit">Confirmar</button>
          <button type="reset">Limpar</button>
        </div>
      </form>
      </div>
    </div>
